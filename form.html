<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Order Form</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Design Order Form</h1>
        <p class="subtitle">Fill in your details below. The design number is linked to your QR code.</p>

        <form id="order-form" novalidate>
          <div class="field">
            <label for="billingName" class="required">Billing Name</label>
            <input id="billingName" name="billingName" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="contact" class="required">Contact Number</label>
            <input
              id="contact"
              name="contact"
              type="tel"
              inputmode="tel"
              autocomplete="tel"
              required
            />
          </div>

          <div class="field">
            <label for="billingAddress" class="required">Billing Address</label>
            <textarea id="billingAddress" name="billingAddress" required></textarea>
          </div>

          <div class="field">
            <label for="gst" class="required">GST No.</label>
            <input id="gst" name="gst" type="text" required />
          </div>

          <div class="field">
            <label for="orderNumber">Order Number</label>
            <input id="orderNumber" name="orderNumber" type="text" placeholder="Optional" />
          </div>

          <fieldset class="sizes">
            <legend>Sizes (enter counts)</legend>
            <div class="size-row">
              <label for="sizeS">S (36)</label>
              <input id="sizeS" name="sizeS" type="number" min="0" value="0" />

              <label for="sizeM">M (38)</label>
              <input id="sizeM" name="sizeM" type="number" min="0" value="0" />

              <label for="sizeL">L (40)</label>
              <input id="sizeL" name="sizeL" type="number" min="0" value="0" />

              <label for="sizeXL">XL (42)</label>
              <input id="sizeXL" name="sizeXL" type="number" min="0" value="0" />

              <label for="sizeXXL">XXL (44)</label>
              <input id="sizeXXL" name="sizeXXL" type="number" min="0" value="0" />
            </div>
          </fieldset>

          <div class="field">
            <label for="quantity" class="required">Quantity (Total)</label>
            <input id="quantity" name="quantity" type="number" readonly value="0" required />
          </div>

          <div class="field">
            <label for="designNumber">Design Number</label>
            <input id="designNumber" name="designNumber" type="text" readonly required />
            <p class="hint">Set automatically from the QR code and cannot be edited.</p>
          </div>

          <button type="submit" class="btn" id="submit-btn">Submit Order</button>
        </form>

        <div id="message" class="message" role="status"></div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/form.js"></script>
  </body>
</html>
